name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - run: make fmt
      - run: make vet
      - run: make test
      - run: make manifests generate
      - run: make yaml-parse
      - run: git diff --exit-code
      - run: make test-race
